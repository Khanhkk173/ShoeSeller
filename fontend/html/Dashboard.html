<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ</title>
    <link rel="stylesheet" href="../Style/Dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
</head>

<body>
    <aside class="sidebar collapsed">
        <header class="sidebar-header">
            <a href="https://web.facebook.com/TruongCongnghethongtinPhenikaa"><img src="../Image/avtdefault.jpg"
                    alt="logo" class="header-logo"></a>
            <button class="sidebar-toggle">
                <i class="bx bx-menu-close"></i>
            </button>
        </header>

        <div class="sidebar-content">
            <form action="#">
                <ul class="menu-list">
                    <li class="menu-item">
                        <a href="#" class="menu-link active">
                            <i class="bx bx-home-alt"></i>
                            <span class="manu-lable">
                                Trang Chủ
                            </span>
                        </a>

                    </li>
                    <li class="menu-item">
                        <a href="#" class="menu-link">
                            <i class="bx bx-cart-alt"></i>
                            <span class="manu-lable">
                                Mua Hàng
                            </span>
                        </a>

                    </li>
                    <li class="menu-item">
                        <a href="#" class="menu-link">
                            <i class="bx bx-pharmacy"></i>
                            <span class="manu-lable">
                                Nhập Hàng
                            </span>
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="#" class="menu-link">
                            <i class="bx bx-chart-line"></i>
                            <span class="manu-lable">
                                Thống Kê
                            </span>
                        </a>
                    </li>
                    <a href="#" class="menu-link">
                        <i class="bx bx-pharmacy"></i>
                        <span class="manu-lable">
                            Nhập Hàng
                        </span>
                    </a>

                </ul>
            </form>
        </div>

        <div class="sidebar-footer">
            <div class="logout">
                <a href="#" onclick="logout()" class="logout-btn">
                    <i class="bx bx-arrow-out-right-square-half"></i>
                    <label class="label-logout">Logout</label>
                </a>
            </div>
        </div>
    </aside>
    <div class="main-box">
        <div class="header">
            <a href="#">
                <h2 class="trangchu">Trang Chủ</h2>
            </a>
            <div class="userlog">
                <h2 id="welcome"></h2>
                <a href="#"><img src="../Image/avt.jpg" alt=""></a>
            </div>
        </div>
        <div class="container">
            <div class="top-box">
                <div class="content-top">
                    <i class="bx bx-groceries"> </i>
                    <div class="noidung">
                        <label>Tổng doanh thu</label>
                        <label id="doanhthu"></label>
                    </div>
                </div>
                <div class="content-top">
                    <i class="bx bx-cart-alt"> </i>
                    <div class="noidung">
                        <label>Tổng đơn hàng</label>
                        <label id="donhang"></label>
                    </div>
                </div>
                <div class="content-top">
                    <i class="bx bx-sneaker"> </i>
                    <div class="noidung">
                        <label>Tổng sản phẩm</label>
                        <label id="sanpham"></label>
                    </div>
                </div>
                <div class="content-top">
                    <i class="bx bx-store-alt"> </i>
                    <div class="noidung">
                        <label>Hàng tồn kho</label>
                        <label id="tonkho"></label>
                    </div>
                </div>
            </div>
            <div class="bottom-box">
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>Doanh thu 7 ngày qua</h3>
                        <select id="rangeSelect">
                            <option value="7" selected>7 ngày</option>
                            <option value="14">14 ngày</option>
                            <option value="30">30 ngày</option>
                        </select>
                    </div>
                    <div class="chart-body">
                        <canvas id="revenueChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../Script/Dashboard.js"></script>
</body>

</html>
