<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ</title>
    <link rel="stylesheet" href="../Style/Dashboard.css">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
</head>

<body>
    <aside class="sidebar collapsed">
        <header class="sidebar-header">
            <a href="#"><img src="../Image/avtdefault.jpg" alt="logo" class="header-logo"></a>
            <button class="sidebar-toggle">
                <i class="bx bx-menu-close" ></i>
            </button>
        </header>

        <div class="sidebar-content">
            <form action="#">
                <ul class="menu-list">
                    <li class="menu-item">
                        <a href="#" class="menu-link active">
                            <i class="bx bx-home-alt"></i>
                            <span class="manu-lable">
                                Trang Chủ
                            </span>
                        </a>

                    </li>
                    <li class="menu-item">
                        <a href="#" class="menu-link">
                            <i class="bx bx-cart-alt"></i>
                            <span class="manu-lable">
                                Mua Hàng
                            </span>
                        </a>

                    </li>
                    <li class="menu-item">
                        <a href="#" class="menu-link">
                            <i class="bx bx-pharmacy"></i>
                            <span class="manu-lable">
                                Nhập Hàng
                            </span>
                        </a>

                    </li>
                    <li class="menu-item">
                        <a href="#" class="menu-link">
                            <i class="bx bx-cart-check"></i>
                            <span class="manu-lable">
                                Đơn Hàng
                            </span>
                        </a>

                    </li>

                </ul>
            </form>
        </div>

        <div class="sidebar-footer">
            <div class="logout">
                <a href="#" onclick="logout()" class="logout-btn">
                    <i class="bx bx-arrow-out-right-square-half"></i>
                    <label class="label-logout" >Logout</label>
                </a>
            </div>
        </div>
    </aside>
    <div class="main-box">
        <div class="header">
           <a href="#"> <h2 class="trangchu" >Trang Chủ</h2></a>
           <h2 id="welcome"></h2>
        </div>
        <div class="top">

        </div>
        <div class="bot">
            
        </div>
    </div>
    <script src="../Script/Dashboard.js"></script>
</body>

</html>
