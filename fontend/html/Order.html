<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn Hàng</title>
    <link rel="stylesheet" href="../Style/Order.css">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
</head>

<body>
    <aside class="sidebar collapsed">
        <header class="sidebar-header">
            <a href="https://web.facebook.com/TruongCongnghethongtinPhenikaa"><img src="../Image/avtdefault.jpg"
                    alt="logo" class="header-logo"></a>
            <button class="sidebar-toggle">
                <i class="bx bx-menu-close"></i>
            </button>
        </header>

        <div class="sidebar-content">
            <form action="#">
                <ul class="menu-list">
                    <li class="menu-item" id="menu-home">
                        <a href="../html/Dashboard.html" class="menu-link">
                            <i class="bx bx-home-alt"></i>
                            <span class="manu-lable">
                                Trang Chủ
                            </span>
                        </a>

                    </li>
                    <li class="menu-item" id="menu-import">
                        <a href="../html/Import.html" class="menu-link ">
                            <i class="bx bx-pharmacy"></i>
                            <span class="manu-lable">
                                Nhập Hàng
                            </span>
                        </a>

                    </li>
                    <li class="menu-item" id="menu-orders">
                        <a href="../html/Order.html" class="menu-link active">

                            <i class="bx bx-cart-alt"></i>
                            <span class="manu-lable">
                                Đơn Hàng
                            </span>
                        </a>
                    </li>
                    <li class="menu-item" id="menu-statistics">
                        <a href="../html/Statistics.html" class="menu-link">
                            <i class="bx bx-chart-line"></i>
                            <span class="manu-lable">
                                Thống Kê
                            </span>
                        </a>
                    </li>
                    <li class="menu-item" id="menu-search">
                        <a href="../html/Search.html" class="menu-link">
                            <i class="bx bx-search-alt"></i>
                            <span class="manu-lable">
                                Tìm kiếm
                            </span>
                        </a>
                    </li>

                </ul>
            </form>
        </div>

        <div class="sidebar-footer">
            <div class="logout">
                <a href="#" onclick="logout()" class="logout-btn">
                    <i class="bx bx-arrow-out-right-square-half"></i>
                    <label class="label-logout">Logout</label>
                </a>
            </div>
        </div>
    </aside>
    <div class="main-box">
        <div class="header">
            <a href="#">
                <h2 class="trangchu">Đơn hàng</h2>
            </a>
            <div class="userlog">
                <h2 id="welcome"></h2>
                <a href="#"><img src="../Image/avt.jpg" alt=""></a>
            </div>
        </div>
        <div class="container">
            <div class="order-page">

                <div class="order-card">
                    <h3>Tạo đơn hàng</h3>

                    <table class="order-table">
                        <thead>
                            <tr>
                                <th>Sản phẩm</th>
                                <th>Số lượng</th>
                                <th>Giá</th>
                                <th>Thành tiền</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="orderItemsBody">
                        </tbody>
                    </table>

                    <button class="btn-add" onclick="addRow()">+ Thêm sản phẩm</button>

                    <div class="order-summary">
                        <span>Tổng tiền:</span>
                        <strong id="totalAmount">0 ₫</strong>
                    </div>

                    <div class="action-row">
                        <button class="btn-primary" onclick="createOrder()">Tạo đơn hàng</button>
                    </div>
                </div>

            </div>
            <div class="order-history-page">

                <div class="order-history-card">
                    <h3>Lịch sử đơn hàng</h3>

                    <table class="order-history-table">
                        <thead>
                            <tr>
                                <th>Mã đơn</th>
                                <th>Ngày đặt</th>
                                <th>Tổng tiền</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="ordersBody">
                            <!-- JS render -->
                        </tbody>
                    </table>
                </div>

                <!-- Modal chi tiết đơn -->
                <div id="orderDetailModal" class="modal">
                    <div class="modal-content">
                        <span class="close" onclick="closeModal()">&times;</span>
                        <h4>Chi tiết đơn hàng</h4>

                        <table class="order-detail-table">
                            <thead>
                                <tr>
                                    <th>Sản phẩm</th>
                                    <th>Size</th>
                                    <th>Màu</th>
                                    <th>Số lượng</th>
                                    <th>Giá</th>
                                </tr>
                            </thead>
                            <tbody id="orderDetailBody"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="../Script/Order.js"></script>
</body>

</html>
